<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ESL World Cup</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; margin: 0; }
        .navbar { display: flex; gap: 20px; padding: 20px; background: #1e293b; }
        .nav-btn { color: #94a3b8; cursor: pointer; text-transform: uppercase; font-weight: bold; border: none; background: none; }
        .nav-btn.active { color: #fff; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; }
        th, td { padding: 15px; border-bottom: 1px solid #334155; text-align: left; }
        .team-logo { width: 30px; height: 20px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="navbar">
    <button class="nav-btn active" onclick="openTab(event, 'gruplar')">Gruplar</button>
</div>

<div id="gruplar" class="tab-content active">
    <table>
        <tr><th>TAKIM</th></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/fr.png"> FRANCE @</td></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/nl.png"> NETHERLANDS @</td></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/br.png"> BRAZIL @</td></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/ma.png"> MOROCCO @</td></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/tr.png"> TURKIYE @</td></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/es.png"> SPAIN @</td></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/de.png"> GERMANY @</td></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/pt.png"> PORTUGAL @</td></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/mx.png"> MEXICO @</td></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/ar.png"> ARGENTINA @</td></tr>
        <tr><td><img class="team-logo" src="https://flagcdn.com/w40/be.png"> BELGIUM @</td></tr>
    </table>
</div>

<script>
    function openTab(evt, tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }
</script>
</body>
</html>
