<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EUROPEAN SOCCER LEAGUE</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: white; }
        
        /* SOL ÜST LİG İSMİ */
        .header { padding: 20px; font-size: 24px; font-weight: bold; color: #38bdf8; background: #0f172a; }

        /* ANA MENÜ */
        .navbar { display: flex; gap: 20px; padding: 15px 20px; background: #1e293b; border-bottom: 2px solid #334155; }
        .nav-btn { color: #94a3b8; cursor: pointer; text-transform: uppercase; font-weight: bold; border: none; background: none; font-size: 14px; }
        .nav-btn.active { color: #fff; border-bottom: 2px solid #fff; }

        /* ANA YAPI */
        .container { display: flex; padding: 20px; gap: 40px; }
        .content { flex: 2; display: none; }
        .content.active { display: block; }
        
        /* SAĞ ÜST TAKIMLAR */
        .sidebar { flex: 1; background: #1e293b; padding: 20px; border-radius: 8px; height: fit-content; }
        .sidebar h3 { margin-top: 0; color: #38bdf8; font-size: 18px; }
        
        /* DETAYLI TABLO */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { color: #94a3b8; padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        td { padding: 10px; border-bottom: 1px solid #334155; }
        .team-cell { display: flex; align-items: center; gap: 10px; }
        .flag { width: 25px; height: 18px; }
    </style>
</head>
<body>

<div class="header">EUROPEAN SOCCER LEAGUE</div>

<div class="navbar">
    <button class="nav-btn active" onclick="showPage('giris', this)">GİRİŞ</button>
    <button class="nav-btn" onclick="showPage('gruplar', this)">GRUPLAR</button>
    <button class="nav-btn" onclick="showPage('fikstur', this)">FİKSTÜR</button>
    <button class="nav-btn" onclick="showPage('takimlar', this)">TAKIMLAR</button>
    <button class="nav-btn" onclick="showPage('istatistikler', this)">İSTATİSTİKLER</button>
    <button class="nav-btn" onclick="showPage('transferler', this)">TRANSFERLER</button>
</div>

<div class="container">
    <div id="giris" class="content active">
        <h1>HOŞ GELDİNİZ</h1>
        <p>Turnuva heyecanı devam ediyor.</p>
    </div>

    <div id="gruplar" class="content">
        <h2>PUAN DURUMU</h2>
        <table>
            <tr><th>#</th><th>TAKIM</th><th>O</th><th>G</th><th>B</th><th>M</th><th>AV</th><th>P</th></tr>
            <tr><td>1</td><td><div class="team-cell">FRANCE</div></td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr>
        </table>
    </div>
    
    <div class="sidebar">
        <h3>TAKIMLAR</h3>
        <table>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/fr.png"> FRANCE</td></tr>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/nl.png"> NETHERLANDS</td></tr>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/br.png"> BRAZIL</td></tr>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/ma.png"> MOROCCO</td></tr>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/tr.png"> TURKIYE</td></tr>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/es.png"> SPAIN</td></tr>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/de.png"> GERMANY</td></tr>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/pt.png"> PORTUGAL</td></tr>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/mx.png"> MEXICO</td></tr>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/ar.png"> ARGENTINA</td></tr>
            <tr><td><img class="flag" src="https://flagcdn.com/w40/be.png"> BELGIUM</td></tr>
        </table>
    </div>
</div>

<script>
    function showPage(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
</script>

</body>
</html>
