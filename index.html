<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL | European Soccer League</title>
    <style>
        :root {
            --primary-color: #1d4ed8; 
            --body-bg: #f8fafc; 
            --text-main: #0f172a;
        }
        body { margin: 0; font-family: sans-serif; background-color: var(--body-bg); color: var(--text-main); }
        
        .hero-banner {
            width: 100%;
            height: 300px;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/4e/FIFA_World_Cup_2026_logo.svg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f5f9; text-transform: uppercase; font-size: 12px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        button { padding: 10px 20px; cursor: pointer; border: none; background: #e2e8f0; border-radius: 4px; font-weight: bold; }
        button.active { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

    <div class="hero-banner"></div>

    <div class="container">
        <div style="margin-bottom: 20px;">
            <button class="active" onclick="showTab('puan')">Puan Durumu</button>
            <button onclick="showTab('takim')">Takımlar</button>
        </div>

        <div id="puan" class="tab-content active">
            <table>
                <tr><th>#</th><th>Takım Adı</th><th>P</th></tr>
                <tr><td>1</td><td>FRANCE</td><td>0</td></tr>
                <tr><td>2</td><td>NETHERLANDS</td><td>0</td></tr>
                <tr><td>3</td><td>BRAZIL</td><td>0</td></tr>
                <tr><td>4</td><td>MOROCCO</td><td>0</td></tr>
                <tr><td>5</td><td>TURKIYE</td><td>0</td></tr>
            </table>
        </div>

        <div id="takim" class="tab-content">
            <table>
                <tr><th>Takım Adı</th></tr>
                <tr><td>FRANCE</td></tr>
                <tr><td>NETHERLANDS</td></tr>
                <tr><td>BRAZIL</td></tr>
                <tr><td>MOROCCO</td></tr>
                <tr><td>TURKIYE</td></tr>
            </table>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
